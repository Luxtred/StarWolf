<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StarWolf Player</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-container" id="app-container">
      
      <aside class="sidebar">
        <div class="sidebar-header">
          <button id="btn-toggle-sidebar" class="ghost-btn rail-btn" title="Alternar Biblioteca">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
          </button>
          <h2 class="panel-label">Biblioteca</h2>
          <div class="sidebar-toolbar">
            <button id="btn-scan" class="tool-btn" title="Abrir carpeta nueva">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
            </button>
            <button id="btn-refresh" class="tool-btn hidden" title="Actualizar cambios">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"></path><path d="M1 20v-6h6"></path><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
            </button>
          </div>
        </div>
        <div id="folder-list" class="folder-grid"></div>
      </aside>

      <main class="player-main" id="main-center">

        <div id="now-playing-view" class="center-view">
          <div class="view-header">
            <button id="btn-back-to-folders" class="back-btn hidden">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
              Volver a carpeta
            </button>
          </div>
          
          <div class="now-playing-layout" id="now-playing-layout">
            <div class="main-art-container">
              <div class="album-art" id="album-art-main">
                <img id="cover-art-img" class="cover-art-img hidden" alt="Carátula" />
                <div class="placeholder-art" id="cover-art-placeholder">🎶</div>

                <div class="lyrics-panel" id="lyrics-panel-main">
                  <button class="lyrics-close-btn" id="btn-close-lyrics-main" title="Cerrar letra">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                  </button>
                  <div class="lyrics-panel-scroll">
                    <p class="lyrics-panel-text" id="lyrics-text-main"></p>
                  </div>
                  <div class="lyrics-panel-footer">
                    <div class="lyrics-panel-footer-info">
                      <span class="lyrics-panel-title" id="lyrics-panel-title-main"></span>
                      <span class="lyrics-panel-artist" id="lyrics-panel-artist-main"></span>
                    </div>
                    <button class="lyrics-edit-link" id="btn-edit-lyrics-main">Editar letra</button>
                  </div>
                </div>
              </div>
              <div class="track-info home-centered-info" id="track-info-main">
                <div class="track-title-row">
                  <h1 id="track-title">Sin reproducir</h1>
                  <button id="btn-like" class="ghost-btn like-btn" title="Me gusta">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"></path></svg>
                  </button>
                </div>
                <h2 id="track-artist">Artista: --</h2>
                <h3 id="track-album">Álbum: --</h3>
                <button id="btn-lyrics-main" class="back-btn lyrics-side-btn">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                  Ver letras
                </button>
              </div>
            </div>

            <aside class="up-next-panel">
              <div class="panel-header-row">
                <h3 class="panel-label">Siguientes en cola</h3>
              </div>
              <ul id="up-next-list">
                <li class="empty-msg">Selecciona una carpeta para ver la cola</li>
              </ul>
            </aside>
          </div>
        </div>

        <div id="folder-tracks-view" class="center-view hidden">
          <div class="view-header">
            <button id="btn-back-to-player" class="back-btn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
              Ver Reproductor
            </button>
            <h2 id="selected-folder-title">Carpeta Seleccionada</h2>
          </div>
          
          <div class="split-tracks-container">
            <div class="tracks-scroll-container">
              <ul id="center-track-list"></ul>
            </div>
            
            <aside class="right-metadata-panel">
              <div class="side-album-art" id="side-album-art">
                <img id="side-cover-img" class="side-cover-img hidden" alt="Carátula" />
                <span id="side-cover-placeholder">🎨</span>
              </div>

              <div class="side-track-details" id="side-track-normal">
                <h3 id="side-title">Ninguna pista</h3>
                <p id="side-artist">Artista: --</p>
                <p id="side-album">Álbum: --</p>
                <button id="btn-lyrics-side" class="back-btn lyrics-side-btn">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                  Ver letras
                </button>
              </div>

              <div class="side-lyrics-view" id="side-lyrics-view">
                <div class="side-lyrics-header">
                  <span class="side-lyrics-title" id="lyrics-panel-title-side"></span>
                  <button class="ghost-btn" id="btn-close-lyrics-side" title="Cerrar letra">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                  </button>
                </div>
                <div class="side-lyrics-scroll">
                  <p class="lyrics-panel-text" id="lyrics-text-side"></p>
                </div>
                <button class="lyrics-edit-link" id="btn-edit-lyrics-side">Editar letra</button>
              </div>
            </aside>
          </div>
        </div>

      </main>

      <footer class="controls">
        <button id="btn-view-queue" class="ghost-btn footer-side-btn" title="Ver cola de reproducción">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6" x2="15" y2="6"></line>
            <line x1="3" y1="12" x2="15" y2="12"></line>
            <line x1="3" y1="18" x2="11" y2="18"></line>
            <path d="M18 9l3 3-3 3"></path>
          </svg>
        </button>

        <div class="controls-center">
          <div class="playback-controls">
            <button id="btn-shuffle" class="mode-btn" title="Aleatorio">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg>
            </button>
            <button id="btn-prev">⏮</button>
            <button id="btn-play">▶</button>
            <button id="btn-next">⏭</button>
            <button id="btn-repeat" class="mode-btn" title="Repetir canción">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 1l4 4-4 4"></path><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><path d="M7 23l-4-4 4-4"></path><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>
            </button>
            <button id="btn-autoplay" class="mode-btn active" title="Continuar con la siguiente al terminar">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>
            </button>
          </div>
          <div class="progress-bar" id="progress-bar">
            <canvas id="spectrum-canvas"></canvas>
          </div>
          <div class="volume-control">
            <button id="btn-volume" class="mode-btn" title="Volumen">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
            </button>
            <div class="volume-popover">
              <input type="range" id="volume-slider" min="0" max="100" value="80" />
            </div>
          </div>
        </div>

        <button id="btn-lyrics" class="ghost-btn footer-side-btn" title="Letras">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
            <line x1="9" y1="7" x2="15" y2="7"></line>
            <line x1="9" y1="11" x2="15" y2="11"></line>
          </svg>
        </button>

        <button id="btn-settings" class="ghost-btn footer-side-btn" title="Ajustes">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
      </footer>

      <audio id="audio-player"></audio>

      <div id="settings-modal" class="settings-modal hidden">
        <div class="settings-panel">
          <div class="settings-panel-header">
            <h3>Ajustes</h3>
            <button id="btn-close-settings" class="ghost-btn" title="Cerrar">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
          </div>
          <label class="settings-label">Color de acento</label>
          <div class="accent-swatches">
            <button class="swatch" data-color="#bb86fc" style="background:#bb86fc" title="Violeta"></button>
            <button class="swatch" data-color="#4fd1c5" style="background:#4fd1c5" title="Turquesa"></button>
            <button class="swatch" data-color="#f6ad55" style="background:#f6ad55" title="Naranja"></button>
            <button class="swatch" data-color="#fc8ce8" style="background:#fc8ce8" title="Rosa"></button>
            <button class="swatch" data-color="#63d471" style="background:#63d471" title="Verde"></button>
          </div>
          <label class="settings-label" style="margin-top:16px;">Tema</label>
          <div class="theme-toggle">
            <button id="btn-theme-dark" class="theme-option active" data-theme="dark">Oscuro</button>
            <button id="btn-theme-light" class="theme-option" data-theme="light">Claro</button>
          </div>
        </div>
      </div>

      <div id="lyrics-modal" class="settings-modal hidden">
        <div class="settings-panel lyrics-modal-panel">
          <div class="settings-panel-header">
            <h3 id="lyrics-track-name">Letras</h3>
            <button id="btn-close-lyrics" class="ghost-btn" title="Cerrar">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
          </div>
          <textarea id="lyrics-textarea" class="lyrics-textarea" placeholder="Pega o escribe la letra de esta canción..."></textarea>
          <button id="btn-save-lyrics" class="theme-option active" style="margin-top:12px;">Guardar</button>
        </div>
      </div>

    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
